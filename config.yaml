# Chatbot Configuration
# Central configuration file for model and application settings
# Edit this file to change models - all other files will read from here

# Model Configuration

model:
  path: "/home/users/bcritt/apichatbot/models/Qwen3-32B-AWQ"
  type: "qwen"
  device: "cuda"
  use_quantization: false
  local_files_only: true

# Generation Parameters
generation:
  max_new_tokens: 512
  do_sample: false  # Greedy decoding for speed
  num_beams: 1      # No beam search
  temperature: null # Disabled for greedy

# Application Settings
app:
  title: "SRC Cluster Knowledge Base API"
  description: "An API to query documentation about Stanford's high-performance computing clusters."
  version: "1.0.0"
  
# API Settings
api:
  cors_origins:
    - "http://localhost:4000"
    - "http://127.0.0.1:4000"
    - "https://docs-dev.carina.stanford.edu"
    - "https://ada-lovelace.stanford.edu"

  # Each cluster has docs in a separate directory
  CLUSTERS:
    sherlock: "sherlock"
    farmshare: "farmshare"
    oak: "oak"
    elm: "elm"
    carina: "carina"
    nero: "nero"

# Caching Configuration
caching:
  # Enable semantic response caching (requires sentence-transformers)
  SEMANTIC_CACHE_ENABLED: true

  # Clear the semantic cache on every startup.
  # Set to true during development/testing to avoid stale responses.
  # Set to false in production to preserve cache across restarts.
  SEMANTIC_CACHE_CLEAR_ON_STARTUP: false
  
  # Similarity threshold for semantic cache hits (0.0-1.0)
  # Lower = more permissive (e.g., 0.70 catches similar phrasings)
  # Higher = stricter (e.g., 0.95 only near-identical questions)
  # Recommended: 0.70-0.75 for good semantic matching
  SEMANTIC_CACHE_THRESHOLD: 0.70
  
  # Cache database file path — absolute /workspace/ path so the file lands in the
  # bind-mounted host directory regardless of CWD inside the Apptainer container.
  SEMANTIC_CACHE_DB: "/workspace/.response_cache.db"

  # LangChain LLM cache database
  LANGCHAIN_CACHE_DB: "/workspace/.langchain.db"

# Retrieval Configuration
retrieval:
  # Maximum number of documents to retrieve per query
  MAX_RETRIEVED_DOCS: 5

  # Chunking strategy — docs are split on ## headers first, with character
  # splitting as fallback for oversized sections or headerless docs.
  CHUNK_SIZE: 2500
  CHUNK_OVERLAP: 200

  # BM25 parameters (optional tuning)
  # BM25_K1: 1.5
  # BM25_B: 0.75

  # Minimum BM25 score for a document to be considered relevant.
  # Documents below this threshold are discarded before prompt injection.
  # Tune empirically against real queries; set to 0.0 to disable filtering.
  # Lowered from 2.0: a threshold of 2.0 can filter out all documents for
  # short or broad queries where term frequencies are low across the corpus.
  # Set to 0.0 to disable filtering entirely; tune upward if noisy docs appear.
  MIN_BM25_SCORE: 1.0

  # Hybrid retrieval: combine BM25 (keyword) with FAISS (semantic) search
  HYBRID_ENABLED: true
  VECTOR_MODEL: "/home/users/bcritt/apichatbot/models/all-MiniLM-L6-v2"
  RRF_K: 60               # Reciprocal rank fusion constant
  FAISS_RRF_WEIGHT: 2.0   # FAISS weight in RRF (>1 = prefer semantic over keyword)

# Grounding check
grounding:
  # Append a disclaimer when the answer discusses cluster-specific topics
  # but cites zero retrieved documents
  GROUNDING_CHECK_ENABLED: true
  REFUSAL_DISCLAIMER: "Note: This answer may not reflect your cluster's specific configuration. Please verify with the documentation or contact srcc-support@stanford.edu."

# Cluster Documentation Paths
clusters:
  sherlock: "docs/sherlock/"
  farmshare: "docs/farmshare/"
  oak: "docs/oak/"
  elm: "docs/elm/"
  carina: "docs/carina/"
  nero: "docs/nero/"

# Shared documentation merged into every cluster's retriever at startup.
# Content here (e.g. SRCC web pages) will be searchable for all cluster queries.
shared_docs: "docs/srcc/"

# Server Settings
server:
  api_port: 8000
  host: "ada-lovelace.stanford.edu"

# Logging Settings
logging:
  log_dir: "logs"
  stats_log: "/workspace/logs/stats.jsonl"

# Worker Configuration (multi-GPU mode)
workers:
  - url: "http://localhost:8001"
    port: 8001
    gpu: "cuda:0"
  - url: "http://localhost:8002"
    port: 8002
    gpu: "cuda:1"
